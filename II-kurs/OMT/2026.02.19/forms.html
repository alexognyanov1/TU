<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms</title>
</head>

<body style="margin: 0; background-color: #f4f7ff; font-family: Arial, sans-serif; color: #222;">
  <div style="max-width: 900px; margin: 0 auto; padding: 24px;">
    <nav style="padding-bottom: 10px; margin-bottom: 16px; border-bottom: 1px solid #cfd6e4; font-size: 14px;">
      <a href="index.html" style="color: #0b5ed7;">Home</a> |
      <a href="lists.html" style="color: #0b5ed7;">Lists</a> |
      <a href="tables.html" style="color: #0b5ed7;">Tables</a> |
      <a href="images.html" style="color: #0b5ed7;">Images</a> |
      <a href="links.html" style="color: #0b5ed7;">Links</a> |
      <a href="forms.html" style="color: #0b5ed7;">Forms</a>
    </nav>

    <h1 style="color: #0b5ed7; margin-top: 0;">Forms</h1>
    <p style="color: #444;">Basic form controls for text, email, select, and textarea.</p>

    <form action="#" method="post"
      style="background-color: #fff; border: 1px solid #cfd6e4; border-radius: 8px; padding: 16px;">
      <p>
        <label for="name">Name:</label><br>
        <input id="name" name="name" type="text" placeholder="Enter your name"
          style="width: 100%; max-width: 420px; padding: 8px;">
      </p>

      <p>
        <label for="email">Email:</label><br>
        <input id="email" name="email" type="email" placeholder="Enter your email"
          style="width: 100%; max-width: 420px; padding: 8px;">
      </p>

      <p>
        <label for="topic">Topic:</label><br>
        <select id="topic" name="topic" style="width: 100%; max-width: 420px; padding: 8px;">
          <option>HTML</option>
          <option>CSS</option>
          <option>JavaScript</option>
        </select>
      </p>

      <p>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" placeholder="Write your message"
          style="width: 100%; max-width: 420px; padding: 8px;"></textarea>
      </p>

      <button type="submit" style="padding: 8px 14px;">Submit</button>
    </form>


    <br>
    <br>

    <div>
      <h2>Въведете потребителско име:</h2>
      <input type="text" style="width:250px;"><br><br>

      <h2>Въведете парола:</h2>
      <input type="password" style="width:300px;"><br><br>

      <button style="padding:5px 10px;">Предаване на данните</button>
      <button style="padding:5px 10px;">Начално установяване</button>

      <br><br><br>

      <h2>Изберете желан обем памет:</h2>

      <label>
        <input type="radio" name="ram" checked> 4 GB
      </label><br>

      <label>
        <input type="radio" name="ram"> 8 GB
      </label><br>

      <label>
        <input type="radio" name="ram"> 16 GB
      </label>

      <br><br>

      <h2>Изберете допълнителни устройства:</h2>

      <label>
        <input type="checkbox" checked> Modem
      </label><br>

      <label>
        <input type="checkbox"> Sound Blaster
      </label><br>

      <label>
        <input type="checkbox"> CD Rom
      </label>

      <br><br>

      <h2>Въведете други изисквания:</h2>

      <textarea style="width:400px; height:120px;">Нямам други изисквания.</textarea>
    </div>

    <p><a href="index.html" style="color: #0b5ed7;">← Back to Home</a></p>
  </div>

</body>

</html>
