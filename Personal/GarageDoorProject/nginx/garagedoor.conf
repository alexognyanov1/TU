# nginx config for garagedoor.amai.bg
#
# Place this file at: /etc/nginx/sites-available/garagedoor
# Enable it:          sudo ln -s /etc/nginx/sites-available/garagedoor \
#                                /etc/nginx/sites-enabled/garagedoor
#                     sudo nginx -t && sudo systemctl reload nginx
#
# Obtain TLS certificate:
#   sudo certbot --nginx -d garagedoor.amai.bg
#
# The FastAPI backend must be running on 127.0.0.1:8000.
# Start it with:
#   uvicorn main:app --host 127.0.0.1 --port 8000

# ── HTTP — redirect to HTTPS + serve Let's Encrypt challenges ─────────────────
server {
    listen 80;
    listen [::]:80;
    server_name garagedoor.amai.bg;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name garagedoor.amai.bg;

    ssl_certificate     /etc/letsencrypt/live/garagedoor.amai.bg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/garagedoor.amai.bg/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-Frame-Options        "DENY"           always;
    add_header Referrer-Policy        "no-referrer"    always;

    # ── WebSocket endpoint for the ESP32 (/ws/esp) ────────────────────────────
    # Long timeouts — the ESP32 holds this connection open indefinitely.
    location /ws/esp {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── All other traffic → FastAPI ───────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
