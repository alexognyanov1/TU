# nginx-stream.conf — MQTT over TLS (MQTTS) on port 8883
#
# The nginx `stream` block is TOP-LEVEL (not inside `http {}`), so this file
# cannot go in sites-available/. Instead:
#
# 1. Copy to the Pi:
#      scp mosquitto/nginx-stream.conf pi@<pi-ip>:~/nginx-stream.conf
#
# 2. On the Pi, install it:
#      sudo mkdir -p /etc/nginx/stream.conf.d
#      sudo cp ~/nginx-stream.conf /etc/nginx/stream.conf.d/mqtt-tls.conf
#
# 3. Add the following block to /etc/nginx/nginx.conf, at the TOP LEVEL
#    (outside and after the existing `http { ... }` block):
#
#      stream {
#          include /etc/nginx/stream.conf.d/*.conf;
#      }
#
# 4. Open port 8883 in ufw and reload nginx:
#      sudo ufw allow 8883/tcp comment "MQTTS"
#      sudo nginx -t && sudo systemctl reload nginx
#
# 5. Forward TCP port 8883 to the Pi on your router (same as you did for 1883).
#    You can then close the 1883 port forward — the ESP32 no longer needs it.
#
# How it works:
#   ESP32 → TLS on port 8883 → nginx (terminates TLS) → plain TCP → Mosquitto:1883
#
# The ESP32 uses WiFiClientSecure + PubSubClient. No WebSocket involved.

server {
    listen 8883 ssl;
    listen [::]:8883 ssl;

    # Reuse the same Let's Encrypt cert as the WSS site.
    # If certbot issued the cert for mqtt.amai.bg, the path is:
    ssl_certificate     /etc/letsencrypt/live/mqtt.amai.bg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mqtt.amai.bg/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Forward plain TCP to Mosquitto's standard listener.
    proxy_pass          127.0.0.1:1883;
    proxy_connect_timeout 5s;
}
