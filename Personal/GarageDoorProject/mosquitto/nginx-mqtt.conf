# nginx-mqtt.conf
#
# Place this file at: /etc/nginx/sites-available/mqtt
# Then enable it:     sudo ln -s /etc/nginx/sites-available/mqtt /etc/nginx/sites-enabled/mqtt
#                     sudo nginx -t && sudo systemctl reload nginx
#
# This block accepts MQTT-over-WebSocket connections on port 443 (HTTPS/WSS)
# and forwards them to Mosquitto's local WebSocket listener on port 9001.
#
# Replace "mqtt.yourdomain.com" with your actual subdomain.
# Replace the ssl_certificate paths with your certificate paths
# (e.g. from Let's Encrypt via certbot).

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mqtt.yourdomain.com;

    # --- TLS certificates ---
    # If using certbot: certbot --nginx -d mqtt.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/mqtt.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mqtt.yourdomain.com/privkey.pem;

    # --- Proxy MQTT-over-WebSocket to Mosquitto ---
    location / {
        proxy_pass          http://127.0.0.1:9001;

        # WebSocket upgrade handshake
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        proxy_set_header    Host       $host;

        # Keep WebSocket connections open indefinitely (MQTT is long-lived).
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name mqtt.yourdomain.com;
    return 301 https://$host$request_uri;
}
