# nginx-mqtt.conf — HTTP redirect for mqtt.amai.bg
#
# This file only handles HTTP traffic on the subdomain.
# It is required so that certbot (Let's Encrypt) can complete HTTP-01
# challenges to issue / renew the TLS certificate used by the stream proxy.
#
# Place this file at: /etc/nginx/sites-available/mqtt
# Then enable it:     sudo ln -s /etc/nginx/sites-available/mqtt \
#                                /etc/nginx/sites-enabled/mqtt
#                     sudo nginx -t && sudo systemctl reload nginx
#
# After enabling, obtain the certificate:
#   sudo certbot certonly --nginx -d mqtt.amai.bg
#
# The actual MQTT reverse proxy (TCP/TLS on port 8883) lives in
# nginx-stream.conf — see that file for setup instructions.

server {
    listen 80;
    listen [::]:80;
    server_name mqtt.amai.bg;

    # Allow Let's Encrypt HTTP-01 challenges through.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}
