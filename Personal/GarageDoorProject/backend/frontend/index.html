<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage — Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 3rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 360px;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.25rem; color: #1a1a1a; }

    /* ESP32 connection indicator */
    .esp-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 1.25rem;
    }
    .esp-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .esp-dot.online  { background: #27ae60; }
    .esp-dot.offline { background: #e74c3c; }

    /* State badges row */
    .badges {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s;
    }
    .badge-label {
      font-weight: 400;
      opacity: 0.65;
      font-size: 0.72rem;
      text-transform: none;
      letter-spacing: 0;
    }

    /* Door state colours */
    .door-open    { background: #d4edda; color: #155724; }
    .door-closed  { background: #f8d7da; color: #721c24; }
    .door-unknown { background: #e2e3e5; color: #383d41; }

    /* Motor state colours */
    .motor-idle   { background: #e2e3e5; color: #383d41; }
    .motor-moving { background: #fff3cd; color: #856404; }

    /* Big round trigger button */
    #triggerBtn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: #4f7df0;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(79,125,240,0.4);
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    #triggerBtn:hover  { background: #3a68da; box-shadow: 0 8px 28px rgba(79,125,240,0.5); }
    #triggerBtn:active { transform: scale(0.96); }
    #triggerBtn:disabled { background: #a0b4f0; box-shadow: none; cursor: not-allowed; }

    .status {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #666;
      min-height: 1.2em;
    }
    .status.success { color: #27ae60; }
    .status.error   { color: #c0392b; }

    .logout {
      margin-top: 2rem;
      background: none;
      border: none;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .logout:hover { color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>&#127968; Garage Door</h1>

    <div class="esp-status">
      <span class="esp-dot" id="espDot"></span>
      <span id="espLabel">Connecting…</span>
    </div>

    <div class="badges">
      <span class="badge door-unknown" id="doorBadge">
        <span class="badge-label">Door</span>
        <span id="doorText">Unknown</span>
      </span>
      <span class="badge motor-idle" id="motorBadge">
        <span class="badge-label">Motor</span>
        <span id="motorText">Idle</span>
      </span>
    </div>

    <button id="triggerBtn" disabled>Trigger</button>

    <p class="status" id="statusMsg"></p>

    <button class="logout" id="logoutBtn">Log out</button>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login";

    const triggerBtn = document.getElementById("triggerBtn");
    const statusMsg  = document.getElementById("statusMsg");
    const espDot     = document.getElementById("espDot");
    const espLabel   = document.getElementById("espLabel");
    const doorBadge  = document.getElementById("doorBadge");
    const doorText   = document.getElementById("doorText");
    const motorBadge = document.getElementById("motorBadge");
    const motorText  = document.getElementById("motorText");

    const DOOR_LABELS  = { open: "Open", closed: "Closed", unknown: "Unknown" };
    const MOTOR_LABELS = { idle: "Idle", moving: "Moving…" };

    // Trigger button label depends on door state
    const TRIGGER_LABELS = { open: "Close", closed: "Open", unknown: "Trigger" };

    let espConnected = false;
    let doorState    = "unknown";
    let motorState   = "idle";

    function applyState(data) {
      if (data.esp_connected !== undefined) espConnected = data.esp_connected;
      if (data.door  !== undefined) doorState  = data.door;
      if (data.motor !== undefined) motorState = data.motor;

      // ESP dot
      espDot.className = "esp-dot " + (espConnected ? "online" : "offline");
      espLabel.textContent = espConnected ? "Device online" : "Device offline";

      // Door badge
      doorBadge.className = "badge door-" + (doorState in DOOR_LABELS ? doorState : "unknown");
      doorText.textContent = DOOR_LABELS[doorState] ?? "Unknown";

      // Motor badge
      motorBadge.className = "badge motor-" + (motorState in MOTOR_LABELS ? motorState : "idle");
      motorText.textContent = MOTOR_LABELS[motorState] ?? "Idle";

      // Trigger button
      const busy = motorState === "moving";
      triggerBtn.disabled = !espConnected || busy;
      triggerBtn.textContent = busy ? "Moving…" : (TRIGGER_LABELS[doorState] ?? "Trigger");
    }

    function showStatus(message, type) {
      statusMsg.textContent = message;
      statusMsg.className = `status ${type}`;
    }

    // ---- Trigger ----
    triggerBtn.addEventListener("click", async () => {
      triggerBtn.disabled = true;
      const prevLabel = triggerBtn.textContent;
      triggerBtn.textContent = "Sending…";
      showStatus("", "");

      try {
        const response = await fetch("/door/trigger", {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}` },
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          window.location.href = "/login";
          return;
        }

        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body.detail || `Server error (${response.status})`);
        }

        showStatus("Command sent!", "success");

      } catch (err) {
        showStatus(err.message || "Failed to send command.", "error");
        triggerBtn.disabled = !espConnected || motorState === "moving";
        triggerBtn.textContent = prevLabel;
      }
      // On success the ESP pushes motor=moving via WS which re-renders the button.
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location.href = "/login";
    });

    // ---- WebSocket to backend for live state updates ----
    let ws;
    let wsReconnectDelay = 1000;

    function connectWS() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${proto}://${location.host}/ws/ui?token=${encodeURIComponent(token)}`);

      ws.onopen = () => { wsReconnectDelay = 1000; };

      ws.onmessage = (event) => {
        try { applyState(JSON.parse(event.data)); } catch (_) {}
      };

      ws.onclose = () => {
        setTimeout(() => {
          wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000);
          connectWS();
        }, wsReconnectDelay);
      };
    }

    connectWS();
  </script>
</body>
</html>
