<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage — BLE Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 2.25rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 380px;
    }

    h1 { font-size: 1.4rem; margin-bottom: 1rem; color: #1a1a1a; }

    /* Connection indicator */
    .conn-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1.25rem;
    }
    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }
    .conn-dot.online  { background: #27ae60; }
    .conn-dot.pending { background: #f39c12; }
    .conn-dot.offline { background: #e74c3c; }

    /* State badges */
    .badges {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s;
    }
    .badge-label {
      font-weight: 400;
      opacity: 0.65;
      font-size: 0.72rem;
      text-transform: none;
      letter-spacing: 0;
    }
    .door-open    { background: #d4edda; color: #155724; }
    .door-closed  { background: #f8d7da; color: #721c24; }
    .door-unknown { background: #e2e3e5; color: #383d41; }
    .motor-idle   { background: #e2e3e5; color: #383d41; }
    .motor-moving { background: #fff3cd; color: #856404; }
    .auth-yes     { background: #d4edda; color: #155724; }
    .auth-no      { background: #f8d7da; color: #721c24; }

    /* Big trigger button */
    #triggerBtn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: #4f7df0;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(79,125,240,0.4);
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      margin: 0.5rem 0 0.25rem;
    }
    #triggerBtn:hover:not(:disabled)  { background: #3a68da; box-shadow: 0 8px 28px rgba(79,125,240,0.5); }
    #triggerBtn:active:not(:disabled) { transform: scale(0.96); }
    #triggerBtn:disabled { background: #a0b4f0; box-shadow: none; cursor: not-allowed; }

    .status {
      margin: 1.25rem 0 0.25rem;
      font-size: 0.9rem;
      color: #666;
      min-height: 1.2em;
    }
    .status.success { color: #27ae60; }
    .status.error   { color: #c0392b; }

    /* Secondary buttons */
    .actions {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .btn-secondary {
      padding: 0.55rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      color: #333;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover:not(:disabled) { background: #f8f9fb; border-color: #4f7df0; color: #4f7df0; }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger:hover:not(:disabled) { background: #fdf2f2; border-color: #c0392b; color: #c0392b; }

    /* Log panel */
    .log {
      margin-top: 1.5rem;
      background: #1a1a1a;
      color: #d4d4d4;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.72rem;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .log:empty { display: none; }

    /* Unsupported browser warning */
    .unsupported {
      background: #fff3cd;
      color: #856404;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>&#127968; Garage Door</h1>

    <div class="conn-status">
      <span class="conn-dot" id="connDot"></span>
      <span id="connLabel">Disconnected</span>
    </div>

    <div class="badges">
      <span class="badge door-unknown" id="doorBadge">
        <span class="badge-label">Door</span>
        <span id="doorText">—</span>
      </span>
      <span class="badge motor-idle" id="motorBadge">
        <span class="badge-label">Motor</span>
        <span id="motorText">—</span>
      </span>
      <span class="badge auth-no" id="authBadge">
        <span class="badge-label">Auth</span>
        <span id="authText">—</span>
      </span>
    </div>

    <button id="triggerBtn" disabled>Connect first</button>

    <p class="status" id="statusMsg"></p>

    <div class="actions">
      <button class="btn-secondary" id="connectBtn">Connect</button>
      <button class="btn-secondary" id="disconnectBtn" disabled>Disconnect</button>
      <button class="btn-secondary btn-danger" id="forgetBtn" disabled>Forget device</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    // ---------- Configuration (must match firmware) ----------
    const SERVICE_UUID = '6a4e3200-667b-11ee-b962-0242ac120002';
    const AUTH_UUID    = '6a4e3201-667b-11ee-b962-0242ac120002';
    const CMD_UUID     = '6a4e3202-667b-11ee-b962-0242ac120002';
    const STATE_UUID   = '6a4e3203-667b-11ee-b962-0242ac120002';
    // Keep in sync with GARAGE_PASSWORD in GarageDoor.ino
    const DEFAULT_PASSWORD = 'garage-demo-2026';

    // ?pw=... URL override is useful for demoing a wrong-password case.
    const params = new URLSearchParams(location.search);
    const PASSWORD = params.get('pw') ?? DEFAULT_PASSWORD;

    // ---------- DOM ----------
    const el = (id) => document.getElementById(id);
    const triggerBtn = el('triggerBtn');
    const connectBtn = el('connectBtn');
    const disconnectBtn = el('disconnectBtn');
    const forgetBtn = el('forgetBtn');
    const statusMsg = el('statusMsg');
    const connDot = el('connDot');
    const connLabel = el('connLabel');
    const doorBadge = el('doorBadge');
    const doorText = el('doorText');
    const motorBadge = el('motorBadge');
    const motorText = el('motorText');
    const authBadge = el('authBadge');
    const authText = el('authText');
    const logEl = el('log');

    // ---------- Support check ----------
    if (!navigator.bluetooth) {
      document.querySelector('.card').innerHTML = `
        <h1>&#127968; Garage Door</h1>
        <div class="unsupported">
          <strong>Web Bluetooth is not available in this browser.</strong><br><br>
          Use one of:
          <ul style="margin: 0.5rem 0 0 1.2rem;">
            <li>Chrome or Edge on desktop (Windows/macOS/Linux)</li>
            <li>Chrome on Android</li>
            <li>Bluefy browser on iOS (free, App Store)</li>
          </ul>
        </div>`;
    }

    // ---------- State ----------
    let device = null;
    let server = null;
    let authChar = null;
    let cmdChar = null;
    let stateChar = null;
    let connected = false;
    let authed = false;
    let doorState = 'unknown';
    let motorState = 'idle';

    const DOOR_LABELS  = { open: 'Open', closed: 'Closed', unknown: 'Unknown' };
    const MOTOR_LABELS = { idle: 'Idle', moving: 'Moving…' };
    const TRIGGER_LABELS = { open: 'Close', closed: 'Open', unknown: 'Trigger' };

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      logEl.textContent += `[${ts}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function showStatus(msg, type = '') {
      statusMsg.textContent = msg;
      statusMsg.className = `status ${type}`;
    }

    function render() {
      // Connection dot
      if (!connected) {
        connDot.className = 'conn-dot offline';
        connLabel.textContent = 'Disconnected';
      } else if (!authed) {
        connDot.className = 'conn-dot pending';
        connLabel.textContent = 'Connected — awaiting auth';
      } else {
        connDot.className = 'conn-dot online';
        connLabel.textContent = `Connected: ${device?.name ?? 'device'}`;
      }

      // Badges
      doorBadge.className = 'badge door-' + (doorState in DOOR_LABELS ? doorState : 'unknown');
      doorText.textContent = DOOR_LABELS[doorState] ?? '—';
      motorBadge.className = 'badge motor-' + (motorState in MOTOR_LABELS ? motorState : 'idle');
      motorText.textContent = MOTOR_LABELS[motorState] ?? '—';
      authBadge.className = 'badge ' + (authed ? 'auth-yes' : 'auth-no');
      authText.textContent = authed ? 'OK' : (connected ? '…' : '—');

      // Buttons
      const busy = motorState === 'moving';
      triggerBtn.disabled = !authed || busy;
      if (!connected)      triggerBtn.textContent = 'Connect first';
      else if (!authed)    triggerBtn.textContent = 'Authenticating…';
      else if (busy)       triggerBtn.textContent = 'Moving…';
      else                 triggerBtn.textContent = TRIGGER_LABELS[doorState] ?? 'Trigger';

      connectBtn.disabled = connected;
      disconnectBtn.disabled = !connected;
      forgetBtn.disabled = !authed;
    }

    // ---------- BLE helpers ----------
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    function onStateNotify(event) {
      const raw = dec.decode(event.target.value);
      log(`state: ${raw}`);
      let data;
      try { data = JSON.parse(raw); } catch { return; }
      if (data.door  !== undefined) doorState  = data.door;
      if (data.motor !== undefined) motorState = data.motor;
      if (data.authed !== undefined) authed = data.authed === true;
      render();
    }

    function onDisconnected() {
      log('GATT server disconnected');
      connected = false;
      authed = false;
      device = null;
      server = null;
      authChar = null;
      cmdChar = null;
      stateChar = null;
      showStatus('Disconnected. Click Connect to reconnect.', '');
      render();
    }

    async function connect() {
      try {
        showStatus('Requesting device…');
        log('requestDevice');
        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'GarageDoor-' }],
          optionalServices: [SERVICE_UUID],
        });
        log(`picked: ${device.name} (id=${device.id})`);
        device.addEventListener('gattserverdisconnected', onDisconnected);

        showStatus('Connecting…');
        server = await device.gatt.connect();
        log('GATT connected');

        const svc = await server.getPrimaryService(SERVICE_UUID);
        authChar  = await svc.getCharacteristic(AUTH_UUID);
        cmdChar   = await svc.getCharacteristic(CMD_UUID);
        stateChar = await svc.getCharacteristic(STATE_UUID);
        log('characteristics resolved');

        await stateChar.startNotifications();
        stateChar.addEventListener('characteristicvaluechanged', onStateNotify);
        log('notifications on');

        connected = true;
        render();

        showStatus('Authenticating…');
        log(`writing password (${PASSWORD.length} bytes)`);
        await authChar.writeValueWithResponse(enc.encode(PASSWORD));
        log('password written');
        // Device notifies State with authed=true/false shortly after.
        showStatus('', '');
      } catch (err) {
        log(`connect failed: ${err.message ?? err}`);
        showStatus(`Connection failed: ${err.message ?? err}`, 'error');
        if (device && device.gatt?.connected) {
          try { device.gatt.disconnect(); } catch {}
        }
        connected = false;
        authed = false;
        render();
      }
    }

    async function disconnect() {
      if (device?.gatt?.connected) {
        log('disconnecting');
        device.gatt.disconnect();
      }
    }

    async function trigger() {
      if (!authed || !cmdChar || motorState === 'moving') return;
      // Optimistic disable to block double-taps before the 'moving' notify arrives.
      triggerBtn.disabled = true;
      const prevLabel = triggerBtn.textContent;
      triggerBtn.textContent = 'Sending…';
      try {
        log('write cmd: trigger');
        await cmdChar.writeValueWithResponse(enc.encode('trigger'));
        showStatus('Command sent.', 'success');
        // render() will update the button once the moving/idle notifications arrive.
      } catch (err) {
        log(`trigger failed: ${err.message ?? err}`);
        showStatus(`Trigger failed: ${err.message ?? err}`, 'error');
        triggerBtn.textContent = prevLabel;
        render();
      }
    }

    async function forgetDevice() {
      if (!authed || !cmdChar) return;
      if (!confirm('Clear the device\'s Bluetooth pairings and restart it?')) return;
      try {
        log('write cmd: clear_bonds');
        await cmdChar.writeValueWithResponse(enc.encode('clear_bonds'));
        showStatus('Device is clearing pairings and restarting.', 'success');
        // The device will disconnect us shortly.
        setTimeout(() => {
          if (device?.gatt?.connected) device.gatt.disconnect();
        }, 500);
      } catch (err) {
        log(`forget failed: ${err.message ?? err}`);
        showStatus(`Forget failed: ${err.message ?? err}`, 'error');
      }
    }

    // ---------- Wire up ----------
    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
    triggerBtn.addEventListener('click', trigger);
    forgetBtn.addEventListener('click', forgetDevice);

    render();
    log(`ready (password length: ${PASSWORD.length})`);
  </script>
</body>
</html>
